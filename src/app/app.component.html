<!-- Template is defined inline inside app.component.ts -->

  
  <!-- Premium Top Brand Status Bar -->
  <app-top-bar [status]="statusPillText"></app-top-bar>
  
  <!-- Burn Workload Timeline Alert Overlay (dynamic height sliding transition) -->
  <app-stress-banner 
    [running]="stressActive" 
    [elapsed]="stressDuration" 
    [total]="stressTotal" 
    (onStop)="toggleStressTest()"
  ></app-stress-banner>
  
  <!-- Hardware Realtime Monitor Strip -->
  <app-monitor-strip [metrics]="monitorMetrics"></app-monitor-strip>
  
  <!-- Slide Down Performance Profiles Cabinet -->
  <app-profiles-drawer 
    [open]="profilesOpen" 
    [activeProfile]="profileName" 
    (onSelect)="onSelectProfile($event)"
  ></app-profiles-drawer>
  
  <!-- Right edge quick ribbon panels -->
  <app-bezel-strips 
    [profilesOpen]="profilesOpen" 
    [stressRunning]="stressActive" 
    (onToggleProfiles)="profilesOpen = !profilesOpen" 
    (onTriggerStress)="toggleStressTest()"
  ></app-bezel-strips>
  
  <!-- Main Grid Workspace Framework -->
  <div class="flex flex-1 relative min-h-0 bg-[#111111]">
    
    <!-- Sidebar Navigation Rail -->
    <app-nav-rail 
      [activePage]="activePage" 
      (pageChange)="activePage = $event"
    ></app-nav-rail>
    
    <!-- Central Scrolling Viewport Area -->
    <main class="flex-grow p-4 overflow-y-auto relative min-h-0">
      
      <!-- Page 1: Quick Tuning Panel -->
      <div *ngIf="activePage === 'quick'" class="flex flex-col md:flex-row gap-4 h-full">
        <!-- Cooling Fan controller -->
        <app-fan-control 
          class="flex-1" 
          [fanLevel]="fanLevel" 
          [manual]="fanEnabled" 
          (fanLevelChange)="fanLevel = $event" 
          (manualChange)="fanEnabled = $event" 
          (onApply)="applyFan()"
        ></app-fan-control>
        
        <!-- AMD Package Power Limits panel -->
        <app-cpu-power-panel 
          class="w-full md:w-[260px] shrink-0" 
          [cpuTdp]="cpuTdp" 
          [cpuMode]="cpuMode" 
          (cpuTdpChange)="cpuTdp = $event" 
          (cpuModeChange)="cpuMode = $event" 
          (onApply)="applyCustomTdp()"
        ></app-cpu-power-panel>
      </div>
      
      <!-- Page 2: Full System Diagnostics Grid -->
      <div *ngIf="activePage === 'diagnostics'" class="h-full">
        <app-diagnostics-panel [data]="cpuLimits"></app-diagnostics-panel>
      </div>
      
      <!-- Page 3: CPU Workload Stress Panel -->
      <div *ngIf="activePage === 'stress'" class="h-full">
        <app-stress-panel 
          [stressActive]="stressActive" 
          [stressDuration]="stressDuration" 
          (onStartTest)="onStartStress($event)" 
          (onStopTest)="onStopStress()"
        ></app-stress-panel>
      </div>
      
    </main>
    
  </div>
  
  <!-- Bottom Pinned Footer Strip -->
  <app-footer-strip></app-footer-strip>
  
  <!-- Floating Micro-Toaster Container -->
  <div class="toaster-container">
    <div *ngFor="let toast of toasts" class="toast-card" [ngClass]="'toast-' + toast.type">
      <span class="toast-icon">
        <ng-container *ngIf="toast.type === 'success'">✓</ng-container>
        <ng-container *ngIf="toast.type === 'error'">⚠</ng-container>
        <ng-container *ngIf="toast.type === 'info'">ℹ</ng-container>
      </span>
      <span class="toast-message">{{ toast.message }}</span>
    </div>
  </div>
  
</div>
